; PlatformIO project for Waveshare E-Paper ESP32 Driver Board
; https://www.waveshare.com/wiki/E-Paper_ESP32_Driver_Board
;
; Board ID: esp32dev = "Espressif ESP32 Dev Module" (4MB flash, ESP32) — matches this hardware:
; https://docs.platformio.org/en/latest/boards/espressif32/esp32dev.html
; That page describes upload *protocol* (default esptool), not USB cable/stub issues.

[env:esp32_epaper]
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts = pre:scripts/load_env.py
; Must match Serial.begin(...) in src/main.cpp (115200).
monitor_speed = 115200
upload_speed = 57600

; Skip RAM stub — fixes many "Failed to write to target RAM" / timeout cases on macOS/USB.
; Comment out the next two lines if uploads work and you want faster flashing.
;upload_flags =
;    --no-stub

; Optional: lock serial port (see `pio device list`).
; upload_port = /dev/cu.usbmodem567E0035301
; monitor_port = /dev/cu.usbmodem567E0035301

; Optional overrides (same board manifest keys as in the esp32dev docs). Try if flash verify fails
; *after* a successful upload, not usually for stub timeouts:
; board_build.flash_mode = dio
; board_build.flash_freq = 40m

lib_deps =
    zinggjm/GxEPD2 @ ^1.5.6
    adafruit/Adafruit GFX Library @ ^1.11.9
    olikraus/U8g2_for_Adafruit_GFX @ ^1.8.0

build_flags =
    -DCORE_DEBUG_LEVEL=0

; OTA needs two app slots (not single huge_app). First USB flash after this change erases old layout.
board_build.partitions = min_spiffs.csv

; After flashing once over USB (e.g. from Windows), set upload_port to the ESP32 IP and run:
;   pio run -e esp32_epaper_ota -t upload
[env:esp32_epaper_ota]
extends = env:esp32_epaper
upload_protocol = espota
; Device IP (DHCP may change it after reboot — check Serial Monitor if OTA fails).
upload_port = 192.168.2.2
upload_flags =
    --auth=change-me-ota-password
upload_speed = 115200
